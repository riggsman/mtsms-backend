<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lecturer Management</title>
    <link rel="stylesheet" href="../styles/table-fix.css">
    <link rel="stylesheet" href="../styles/global.css">
    <link rel="stylesheet" href="LecturerManagement.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #f5f5f5;
        }
    </style>
</head>
<body>
    <div class="lecturer-management">
        <div class="page-header">
            <h1>Lecturer Management</h1>
            <button class="btn-primary" onclick="showAddModal()">Add New Lecturer</button>
        </div>

        <div class="table-container-wrapper">
            <div class="table-container">
                <table class="lecturer-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Employee ID</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Phone</th>
                            <th>Department</th>
                            <th>Qualification</th>
                            <th>Specialization</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="teachers-tbody">
                        <tr>
                            <td colspan="9" class="loading">Loading lecturers...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Pagination -->
        <div class="pagination">
            <button id="prev-btn" onclick="changePage(-1)" class="btn-pagination">Previous</button>
            <span class="page-info" id="page-info">Page 1 of 1 (0 total)</span>
            <button id="next-btn" onclick="changePage(1)" class="btn-pagination">Next</button>
        </div>
    </div>

    <script>
        let currentPage = 1;
        let pageSize = 10;
        let total = 0;

        // Fetch teachers on page load
        document.addEventListener('DOMContentLoaded', () => {
            fetchTeachers();
        });

        async function fetchTeachers() {
            try {
                const tbody = document.getElementById('teachers-tbody');
                tbody.innerHTML = '<tr><td colspan="9" class="loading">Loading lecturers...</td></tr>';

                const token = localStorage.getItem('token');
                const tenantName = localStorage.getItem('tenantName') || 'riggstech';
                
                const response = await fetch(
                    `http://localhost:8000/api/v1/teachers?page=${currentPage}&page_size=${pageSize}`,
                    {
                        headers: {
                            'Authorization': `Bearer ${token}`,
                            'X-Tenant-Name': tenantName,
                            'Content-Type': 'application/json'
                        }
                    }
                );

                if (!response.ok) {
                    throw new Error('Failed to fetch teachers');
                }

                const data = await response.json();
                const teachers = data.items || [];
                total = data.total || 0;

                if (teachers.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="9" class="no-data">No lecturers found</td></tr>';
                } else {
                    tbody.innerHTML = teachers.map(teacher => `
                        <tr>
                            <td>${teacher.id}</td>
                            <td>${teacher.employee_id || 'N/A'}</td>
                            <td class="name-cell">
                                ${teacher.firstname} ${teacher.middlename || ''} ${teacher.lastname}
                            </td>
                            <td>${teacher.email || 'N/A'}</td>
                            <td>${teacher.phone || 'N/A'}</td>
                            <td>${teacher.department_id || 'N/A'}</td>
                            <td class="wrap">${teacher.qualification || 'N/A'}</td>
                            <td class="wrap">${teacher.specialization || 'N/A'}</td>
                            <td class="actions-cell">
                                <button class="btn-edit" onclick="editTeacher(${teacher.id})">Edit</button>
                                <button class="btn-delete" onclick="deleteTeacher(${teacher.id})">Delete</button>
                            </td>
                        </tr>
                    `).join('');
                }

                updatePagination();
            } catch (error) {
                const tbody = document.getElementById('teachers-tbody');
                tbody.innerHTML = `<tr><td colspan="9" class="error">Error: ${error.message}</td></tr>`;
                console.error('Error fetching teachers:', error);
            }
        }

        function changePage(delta) {
            const newPage = currentPage + delta;
            const totalPages = Math.ceil(total / pageSize);
            
            if (newPage >= 1 && newPage <= totalPages) {
                currentPage = newPage;
                fetchTeachers();
            }
        }

        function updatePagination() {
            const totalPages = Math.ceil(total / pageSize);
            document.getElementById('page-info').textContent = 
                `Page ${currentPage} of ${totalPages} (${total} total)`;
            
            document.getElementById('prev-btn').disabled = currentPage === 1;
            document.getElementById('next-btn').disabled = currentPage >= totalPages;
        }

        function editTeacher(teacherId) {
            console.log('Edit teacher:', teacherId);
            // Implement edit functionality
        }

        function deleteTeacher(teacherId) {
            if (confirm('Are you sure you want to delete this lecturer?')) {
                console.log('Delete teacher:', teacherId);
                // Implement delete functionality
            }
        }

        function showAddModal() {
            console.log('Show add modal');
            // Implement add modal
        }
    </script>
</body>
</html>
